<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fangbuch Pro</title>
  <style>
    body { font-family: sans-serif; padding: 15px; background: #f4f7f6; font-size: 18px; }
    .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
    h2 { margin-top: 0; font-size: 1.5rem; color: #2c3e50; }
    label { font-weight: 800; display: block; margin-top: 15px; font-size: 1.1rem; }
    input, select { width: 100%; padding: 16px; margin: 8px 0; border: 2px solid #ccc; border-radius: 10px; font-size: 1.1rem; box-sizing: border-box; }
    button { width: 100%; padding: 20px; border: none; border-radius: 10px; font-weight: 900; font-size: 1.2rem; cursor: pointer; color: white; margin-top: 10px; }
    .btn-save { background: #007bff; }
    .btn-neu { background: #6c757d; }
    .btn-fang { background: #17a2b8; }
    .btn-sync { background: #28a745; margin-bottom: 30px; }
    .del-btn { color: red; font-weight: bold; cursor: pointer; margin-left: 10px; font-size: 0.9rem; }
  </style>
</head>
<body onload="init()">
  <div class="card">
    <h2>Session///</h2>
    <label>Session Nr.</label><input type="text" id="snr">
    <label>Datum</label><input type="date" id="datum">
    <label>Start / Ende</label>
    <div style="display:flex; gap:10px;"><input type="time" id="von"><input type="time" id="bis"></div>
    <label>Gewässer</label><select id="gewaesser"><option value="">-- Gewässer --</option></select>
    <button id="saveBtn" class="btn-save" onclick="addSession()">Session speichern</button>
    <button class="btn-neu" onclick="newSession()">+ Neue Session starten</button>
  </div>
  <div class="card">
    <h2>Fänge</h2>
    <label>Fangzeit</label><input type="time" id="fangZeit">
    <label>Fischart</label><select id="fisch"><option value="">-- Fischart --</option></select>
    <label>Länge (cm)</label><input type="number" id="laenge">
    <button class="btn-fang" onclick="addFang()">Fang hinzufügen</button>
    <ul id="fangListe"></ul>
  </div>
  <button id="syncBtn" class="btn-sync" onclick="sync()">Sync mit GSheet</button>
  
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyXlY6V8QAWT2emlsn8eOtSEcl2ChnOC2NgHFUi9lViT-bth3gSolC7SbTyIk2ZgB9q0Q/exec';

    async function init() {
      if (!localStorage.getItem('masterData')) {
        try {
          const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getData' }) });
          localStorage.setItem('masterData', JSON.stringify(await resp.json()));
        } catch(e) { console.log("Offline"); }
      }
      render();
      updateFangListe();
    }

    function render() {
      const master = JSON.parse(localStorage.getItem('masterData') || '{}');
      const queue = JSON.parse(localStorage.getItem('queue') || '[]');
      const session = queue.find(e => e.typ === 'session');
      
      let g = document.getElementById('gewaesser');
      let f = document.getElementById('fisch');
      if(master.gewaesser && g.options.length <= 1) master.gewaesser.forEach(i => g.innerHTML += `<option value="${i}">${i}</option>`);
      if(master.fischarten && f.options.length <= 1) master.fischarten.forEach(i => f.innerHTML += `<option value="${i}">${i}</option>`);

      if (session) {
        document.getElementById('snr').value = session.snr;
        document.getElementById('datum').value = session.datum;
        document.getElementById('von').value = session.von;
        document.getElementById('bis').value = session.bis;
        document.getElementById('gewaesser').value = session.gewaesser;
        ['datum', 'von', 'bis', 'gewaesser'].forEach(id => document.getElementById(id).disabled = true);
        document.getElementById('saveBtn').disabled = true;
        document.getElementById('saveBtn').innerText = "Session aktiv";
      } else {
        if (!document.getElementById('datum').value) document.getElementById('datum').valueAsDate = new Date();
        document.getElementById('snr').value = localStorage.getItem('lastSnr') || master.nextSnr || "";
      }
    }

    function addSession() {
      const snr = document.getElementById('snr').value;
      const datum = document.getElementById('datum').value;
      const von = document.getElementById('von').value;
      const bis = document.getElementById('bis').value;
      const gewaesser = document.getElementById('gewaesser').value;
      if (!snr || !datum || !von || !bis || !gewaesser) return alert("Alle Session-Felder ausfüllen!");
      saveToQueue({ typ: 'session', snr, datum, von, bis, gewaesser });
      const parts = snr.split('-');
      if(parts.length > 1) localStorage.setItem('lastSnr', parts[0] + "-" + (parseInt(parts[1]) + 1));
      location.reload();
    }

    function addFang() {
      const session = JSON.parse(localStorage.getItem('queue') || '[]').find(e => e.typ === 'session');
      if (!session) return alert("Bitte erst Session speichern!");
      const zeit = document.getElementById('fangZeit').value;
      const fisch = document.getElementById('fisch').value;
      const laenge = document.getElementById('laenge').value;
      if (!zeit || !fisch || !laenge) return alert("Bitte Fangzeit, Fischart und Länge angeben!");
      saveToQueue({ typ: 'fang', snr: session.snr, datum: session.datum, zeit, fisch, laenge, id: Date.now() });
      location.reload();
    }

    function saveToQueue(entry) {
      const queue = JSON.parse(localStorage.getItem('queue') || '[]');
      queue.push(entry);
      localStorage.setItem('queue', JSON.stringify(queue));
    }

    function updateFangListe() {
      const queue = JSON.parse(localStorage.getItem('queue') || '[]');
      const liste = document.getElementById('fangListe');
      liste.innerHTML = "";
      queue.filter(e => e.typ === 'fang').forEach(e => {
        liste.innerHTML += `<li><b>S${e.snr}:</b> ${e.zeit} - ${e.fisch} (${e.laenge}cm) <span class="del-btn" onclick="deleteFang(${e.id})">[Löschen]</span></li>`;
      });
    }

    function deleteFang(id) {
      let queue = JSON.parse(localStorage.getItem('queue') || '[]');
      queue = queue.filter(e => e.id !== id);
      localStorage.setItem('queue', JSON.stringify(queue));
      location.reload();
    }

    function newSession() {
      let queue = JSON.parse(localStorage.getItem('queue') || '[]');
      queue = queue.filter(e => e.typ !== 'session');
      localStorage.setItem('queue', JSON.stringify(queue));
      location.reload(); 
    }

    async function sync() {
      const queue = JSON.parse(localStorage.getItem('queue') || '[]');
      document.getElementById('syncBtn').innerText = "Sync läuft...";
      try {
        // Hier wird jetzt IMMER gesynct, egal ob Queue leer oder nicht, 
        // um Stammdaten zu aktualisieren.
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'saveBatch', payload: queue }) });
        const master = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getData' }) }).then(r => r.json());
        localStorage.setItem('masterData', JSON.stringify(master));
        localStorage.setItem('lastSnr', master.nextSnr);
        localStorage.removeItem('queue');
        alert("Sync erfolgreich!");
        location.reload();
      } catch (e) { alert("Sync fehlgeschlagen!"); document.getElementById('syncBtn').innerText = "Sync mit GSheet"; }
    }
  </script>
</body>
</html>
